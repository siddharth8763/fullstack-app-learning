version: "3.9"

# =============================================================
# FULLSTACK LEARNING PLATFORM — Docker Compose
# INTERVIEW NOTE: docker-compose is for LOCAL DEV only.
# In production you'd use Kubernetes (see infra/k8s/) or
# AWS ECS Fargate (see infra/aws-cdk/).
# =============================================================

networks:
  app-network:
    driver: bridge
    # All services communicate through this internal network.
    # They can reference each other by service name (DNS).

volumes:
  mysql-data:
    # Named volume persists DB data across container restarts.
  prometheus-data:
  grafana-data:

services:

  # ─────────────────────────────────────────────
  # MySQL Database
  # INTERVIEW: MySQL uses InnoDB storage engine by default.
  # It supports ACID transactions, foreign keys, and row-level locking.
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: fullstack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./services/auth-service/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # Auth Service — JWT + Google OAuth 2.0
  # ─────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_DIR: services/auth-service
    container_name: fullstack-auth
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${AUTH_SERVICE_PORT}
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # User Service — CRUD with RBAC
  # ─────────────────────────────────────────────
  user-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_DIR: services/user-service
    container_name: fullstack-users
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${USER_SERVICE_PORT}
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    ports:
      - "3002:3002"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # API Gateway — single entry point for clients
  # INTERVIEW: The gateway handles: routing, rate-limiting,
  # auth token validation, and CORS — so microservices don't
  # have to each implement all of these.
  # ─────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_DIR: services/api-gateway
    container_name: fullstack-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${API_GATEWAY_PORT}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - user-service
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # Frontend — React + Vite (served via nginx in prod)
  # In dev mode this is the Vite dev server.
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
      target: development
    container_name: fullstack-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:3000
      VITE_GOOGLE_REDIRECT_URL: http://localhost:3001/auth/google
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # Prometheus — metrics collector
  # INTERVIEW: Prometheus uses a pull model (scrapes /metrics endpoints).
  # Push model alternatives: StatsD, InfluxDB.
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: fullstack-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # Grafana — metrics visualization
  # INTERVIEW: Grafana queries Prometheus via PromQL.
  # Dashboards can be provisioned as JSON files (GitOps friendly).
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: fullstack-grafana
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - app-network

  # ─────────────────────────────────────────────
  # Node Exporter — host-level metrics for Grafana
  # INTERVIEW: Exposes OS-level metrics (CPU, memory, disk I/O)
  # that Prometheus scrapes and Grafana displays.
  # ─────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: fullstack-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - app-network
